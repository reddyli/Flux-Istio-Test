apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pulsar.fullname" . }}
  labels:
    {{- include "pulsar.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # Pulsar is slow to restart and can't run two copies against the same
  # PVC; Recreate avoids the default RollingUpdate trying to bring up a
  # second pod before the first releases the disk.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "pulsar.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pulsar.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- toYaml .Values.args | nindent 12 }}
          ports:
            - name: broker
              containerPort: {{ .Values.service.brokerPort }}
              protocol: TCP
            - name: admin
              containerPort: {{ .Values.service.adminPort }}
              protocol: TCP
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /pulsar/data
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "pulsar.fullname" . }}-data
      {{- end }}
