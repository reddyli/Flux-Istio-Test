server:
  port: 8080

spring:
  pulsar:
    client:
      service-url: pulsar://localhost:6650
      connection-timeout: 10s
      operation-timeout: 30s
    producer:
      send-timeout: 30s
      batching-enabled: true
    template:
      observations-enabled: true
  application:
    name: order-service
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    url: jdbc:postgresql://localhost:5432/orders
    username: orders
    password: orders_pw
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate.format_sql: true
    defer-datasource-initialization: true
    show-sql: true
  sql:
    init:
      mode: always

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,beans,conditions,env,configprops
  tracing:
    sampling:
      probability: 1.0
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces

logging:
  structured:
    format:
      console: ecs

stock-service:
  url: http://localhost:8081
