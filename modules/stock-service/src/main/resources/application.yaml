server:
  port: 8081

spring:
  pulsar:
    client:
      service-url: pulsar://localhost:6650
      connection-timeout: 10s
      operation-timeout: 30s
    consumer:
      subscription:
        type: Shared
        initial-position: Earliest
    listener:
      concurrency: 5
      observation-enabled: true
  application:
    name: stock-service
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    url: jdbc:postgresql://localhost:5432/stock
    username: stock
    password: stock_pw
  jpa:
    hibernate:
      ddl-auto: none           # we own the schema, not Hibernate
    properties:
      hibernate.format_sql: true
    defer-datasource-initialization: true   # run schema.sql AFTER Hibernate inspects the DB
    show-sql: true             # print SQL to logs while learning; turn off later
  sql:
    init:
      mode: always             # run schema.sql/data.sql every startup (idempotent thanks to IF NOT EXISTS / ON CONFLICT)

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,beans,conditions,env,configprops
  tracing:
    sampling:
      probability: 1.0
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces

logging:
  structured:
    format:
      console: ecs